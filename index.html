<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chatbot Práctica III</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>📚 Chat IA</h2>
        <button onclick="newChat()">+ Nuevo chat</button>
        <div id="history"></div>
    </aside>

    <!-- Chat -->
    <main class="chat">
        <div id="messages"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribí tu pregunta...">
            <button onclick="sendMessage()">➤</button>
        </div>
    </main>

</div>

<script src="script.js"></script>
</body>
</html>
