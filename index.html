<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autogestion Aplicada - Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h2>Autogestion Aplicada</h2>
            <span class="status-online"></span>
        </div>
        
        <div id="chat-box" class="chat-box">
            <div class="message bot">¡Hola! Soy tu asistente de Autogestión Aplicada. ¿En qué puedo ayudarte hoy?</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Escribe tu consulta aquí..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
